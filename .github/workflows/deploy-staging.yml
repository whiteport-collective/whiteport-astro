name: Deploy staging to Hostup

on:
  push:
    branches:
      - preview

concurrency:
  group: hostup-staging
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy astro.whiteport.com
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reinstall sharp for Linux
        run: npm install --os=linux --cpu=x64 sharp

      - name: Restore Astro content cache
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-content-${{ runner.os }}-${{ hashFiles('src/content/**/*', 'astro.config.mjs', 'package-lock.json') }}
          restore-keys: |
            astro-content-${{ runner.os }}-

      - name: Build staging site
        run: npm run build
        env:
          SITE_URL: https://astro.whiteport.com
          GDRIVE_STRICT: 'false'
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID: ${{ secrets.ELEVENLABS_VOICE_ID }}

      - name: Verify build output
        shell: bash
        run: |
          test -d dist
          test -f dist/index.html
          test -s dist/index.html

      - name: Strip files over 25 MiB
        shell: bash
        run: |
          echo "Files >25 MiB to be removed before deploy:"
          find dist -type f -size +25M -printf '  %p (%s bytes)\n' || true
          find dist -type f -size +25M -delete
          echo "Done."

      - name: Deploy dist to Hostup staging
        run: node scripts/deploy-astro.cjs
        env:
          HOSTUP_HOST: ${{ secrets.HOSTUP_SFTP_HOST || 'mu.hostup.se' }}
          HOSTUP_USER: ${{ secrets.HOSTUP_SFTP_USER || 'astrowhi' }}
          HOSTUP_REMOTE_BASE: /home/astrowhi/public_html
          HOSTUP_SSH_KEY: ${{ secrets.HOSTUP_SSH_KEY }}
          HOSTUP_PASSWORD: ${{ secrets.HOSTUP_SFTP_PASSWORD }}

      - name: Verify staging HTTP 200
        shell: bash
        run: |
          for attempt in {1..12}; do
            status="$(curl -L -s -o /dev/null -w '%{http_code}' https://astro.whiteport.com/)"
            if [ "$status" = "200" ]; then
              echo "astro.whiteport.com returned HTTP 200"
              exit 0
            fi
            echo "Attempt ${attempt}: got HTTP ${status}; retrying..."
            sleep 10
          done
          exit 1

      - name: Notify Agent Space
        if: always()
        run: node scripts/notify-agent-message.cjs
        env:
          AGENT_MESSAGE_TITLE: "Preview live: ${{ github.event.head_commit.message }}"
          AGENT_MESSAGE_CONTENT: |
            Preview deploy finished with status: ${{ job.status }}
            URL: https://astro.whiteport.com/
            Commit: ${{ github.sha }}
          AGENT_MESSAGE_TO: MartenAngner
          AGENT_MESSAGE_PRIORITY: normal

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Hostup staging deploy complete"
            echo ""
            echo "- URL: https://astro.whiteport.com/"
            echo "- Remote: /home/astrowhi/public_html/"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
