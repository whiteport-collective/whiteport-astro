name: Cloudflare Pages Preview

on:
  push:
    branches:
      - 'draft/**'

concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build and deploy preview
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reinstall sharp for Linux
        run: npm install --os=linux --cpu=x64 sharp

      - name: Restore Astro content cache
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-content-${{ runner.os }}-${{ hashFiles('src/content/**/*', 'astro.config.mjs', 'package-lock.json') }}
          restore-keys: |
            astro-content-${{ runner.os }}-

      - name: Extract branch info
        id: branch
        shell: bash
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          SLUG="${BRANCH#draft/}"
          CF_ALIAS="$(echo "$BRANCH" | tr '/' '-')"
          PREVIEW_BASE="https://${CF_ALIAS}.whiteport-astro.pages.dev"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "preview_base=$PREVIEW_BASE" >> "$GITHUB_OUTPUT"
          echo "preview_url=${PREVIEW_BASE}/blog/${SLUG}/" >> "$GITHUB_OUTPUT"

      - name: Build site
        run: npm run build
        env:
          SITE_URL: ${{ steps.branch.outputs.preview_base }}
          GDRIVE_STRICT: 'false'

      - name: Strip files over 25 MiB (Cloudflare Pages limit)
        run: |
          echo "Files >25 MiB to be removed before deploy:"
          find dist -type f -size +25M -printf '  %p (%s bytes)\n' || true
          find dist -type f -size +25M -delete
          echo "Done."

      - name: Deploy to Cloudflare Pages
        run: npx wrangler@3 pages deploy dist --project-name=whiteport-astro --branch="${{ steps.branch.outputs.branch }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Preview deployed"
            echo ""
            echo "- Branch: ${{ steps.branch.outputs.branch }}"
            echo "- Preview: ${{ steps.branch.outputs.preview_url }}"
            echo ""
            echo "URL active in ~60s."
          } >> "$GITHUB_STEP_SUMMARY"
