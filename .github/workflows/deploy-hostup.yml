name: Deploy to Hostup

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: hostup-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reinstall sharp for Linux
        run: npm install --os=linux --cpu=x64 sharp

      - name: Restore Astro content cache
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-content-${{ runner.os }}-${{ hashFiles('src/content/**/*', 'astro.config.mjs', 'package-lock.json') }}
          restore-keys: |
            astro-content-${{ runner.os }}-

      - name: Build site
        run: npm run build
        env:
          SITE_URL: https://whiteport.com
          GDRIVE_STRICT: 'false'

      - name: Verify build output
        shell: bash
        run: |
          test -d dist
          test -f dist/index.html
          test -s dist/index.html

      - name: Strip files over 25 MiB
        shell: bash
        run: |
          echo "Files >25 MiB to be removed before deploy:"
          find dist -type f -size +25M -printf '  %p (%s bytes)\n' || true
          find dist -type f -size +25M -delete
          echo "Done."

      - name: Deploy dist to Hostup
        run: node scripts/deploy-astro.cjs
        env:
          HOSTUP_HOST: mu.hostup.se
          HOSTUP_USER: astrowhi
          HOSTUP_REMOTE_BASE: /home/astrowhi/public_html
          HOSTUP_SSH_KEY: ${{ secrets.HOSTUP_SSH_KEY }}

      - name: Verify production HTTP 200
        shell: bash
        run: |
          for attempt in {1..6}; do
            status="$(curl -L -s -o /dev/null -w '%{http_code}' https://whiteport.com/)"
            if [ "$status" = "200" ]; then
              echo "whiteport.com returned HTTP 200"
              exit 0
            fi
            echo "Attempt ${attempt}: got HTTP ${status}; retrying..."
            sleep 10
          done
          exit 1

      - name: Summary
        shell: bash
        run: |
          {
            echo "### Hostup production deploy complete"
            echo ""
            echo "- URL: https://whiteport.com/"
            echo "- Remote: /home/astrowhi/public_html/"
            echo "- Commit: $GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
