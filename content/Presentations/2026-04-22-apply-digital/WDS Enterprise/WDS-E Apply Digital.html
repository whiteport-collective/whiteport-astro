<style>
  :root {
    --bg-deep: #06060b;
    --bg-card: #12121e;
    --bg-card-hover: #1a1a2e;
    --border: #1e1e32;
    --border-strong: #2a2a42;
    --text-primary: #f4f4f8;
    --text-secondary: #b8b8cc;
    --text-muted: #7a7a95;
    --accent-blue: #4e8eff;
    --accent-purple: #9b6dff;
    --accent-green: #00e88f;
    --accent-orange: #ff8c42;
    --accent-rose: #ff6b9d;
    --wp-rose: #e8184f;
    --gradient: linear-gradient(135deg, #4e8eff, #9b6dff);
    --gradient-warm: linear-gradient(135deg, #ff8c42, #ff6b9d);
  }
  html, body {
    margin: 0; padding: 0;
    background: #000;
    color: var(--text-primary);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  section.slide {
    background: var(--bg-deep);
    color: var(--text-primary);
    overflow: hidden;
    position: relative;
    font-family: 'Inter', sans-serif;
  }
  section.slide::before {
    content:'';
    position:absolute; inset:0;
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(155,109,255,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(78,142,255,0.06), transparent 60%);
    pointer-events:none; z-index:0;
  }
  .frame { position:absolute; inset:0; padding:100px 120px; display:flex; flex-direction:column; z-index:1; }
  .progress { position:absolute; top:0; left:0; right:0; height:3px; background:rgba(255,255,255,0.04); z-index:10; }
  .progress__bar { height:100%; background:var(--gradient); transform-origin:left center; transition:transform 700ms cubic-bezier(0.16,1,0.3,1); }
  .slide--warm .progress__bar { background: var(--gradient-warm); }

  /* chrome */
  .chrome-logo { position:absolute; left:48px; bottom:40px; display:flex; align-items:center; gap:12px; z-index:5; }
  .chrome-logo__img { width:28px; height:28px; display:block; opacity:0.95; }
  .chrome-logo__text { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.24em; text-transform:uppercase; color:var(--text-secondary); font-weight:500; }
  .chrome-counter { position:absolute; right:48px; bottom:40px; font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--text-muted); letter-spacing:0.1em; z-index:5; font-variant-numeric:tabular-nums; }

  /* labels */
  .label { font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:0.28em; text-transform:uppercase; color:var(--accent-blue); font-weight:500; }
  .label--warm { color: var(--accent-orange); }
  .label--muted { color: var(--text-muted); }
  .label--green { color: var(--accent-green); }

  /* type */
  .headline { font-size:112px; line-height:0.98; letter-spacing:-0.035em; font-weight:800; margin:0; color:var(--text-primary); }
  .title { font-size:64px; line-height:1.2; letter-spacing:-0.022em; font-weight:700; margin:0; color:var(--text-primary); }
  .title--lg { font-size:80px; line-height:1.2; }
  .title--sm { font-size:52px; }
  .body { font-size:28px; line-height:1.55; color:var(--text-secondary); margin:0; font-weight:400; }
  .body--lg { font-size:32px; line-height:1.5; }
  .body--sm { font-size:22px; line-height:1.6; }
  .grad-text { background:var(--gradient); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .grad-text--warm { background:var(--gradient-warm); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  /* cards */
  .card { background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:32px 36px; position:relative; }
  .card--elev { background:var(--bg-card-hover); border-color:var(--border-strong); }
  .card__num { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.22em; color:var(--text-muted); font-weight:500; margin-bottom:14px; }
  .card__title { font-size:28px; line-height:1.2; letter-spacing:-0.01em; font-weight:600; color:var(--text-primary); margin:0 0 14px 0; }
  .card__body { font-size:19px; line-height:1.55; color:var(--text-secondary); margin:0; }

  /* motion */
  section.slide[data-deck-active] [data-anim] {
    opacity:0;
    transform: translateY(16px) scale(0.99);
    animation: riseIn 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
    animation-delay: calc(var(--d,0) * 90ms + 80ms);
  }
  @keyframes riseIn { to { opacity:1; transform: translateY(0) scale(1); } }
  section.slide[data-deck-active] [data-draw] {
    stroke-dasharray: var(--len, 400);
    stroke-dashoffset: var(--len, 400);
    animation: draw 1.1s cubic-bezier(0.5,0,0.2,1) forwards;
    animation-delay: calc(var(--d,0) * 90ms + 260ms);
  }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  /* quote cards */
  .quote-card {
    background: linear-gradient(180deg, rgba(26,26,46,0.7), rgba(18,18,30,0.7));
    border:1px solid var(--border);
    border-radius:18px;
    padding:52px 56px;
    position:relative;
    overflow:hidden;
  }
  .quote-card::before {
    content:''; position:absolute; top:0; left:0;
    width:3px; height:100%;
    background:var(--gradient);
    opacity:0.7;
  }
  .quote-card__mark {
    position:absolute; top:18px; right:44px;
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:180px; line-height:1;
    color:rgba(155,109,255,0.18); font-weight:500; letter-spacing:-0.04em;
  }
  .quote-card__text {
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-size:44px; line-height:1.4; letter-spacing:-0.005em;
    font-weight:500; color:var(--text-primary);
    margin:0 0 36px 0; position:relative; z-index:1;
    text-wrap: pretty;
  }
  .quote-card__attr { display:flex; align-items:center; gap:14px; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); }
  .quote-card__attr::before { content:''; width:28px; height:1px; background:var(--text-muted); }

  /* grids */
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; }
  .grid-2 { display:grid; grid-template-columns:repeat(2,1fr); gap:28px; }

  /* point blocks */
  .points { display:grid; grid-template-columns:repeat(3,1fr); gap:32px; }
  .point__num { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.22em; color:var(--text-muted); margin-bottom:16px; }
  .point__lead { font-size:26px; line-height:1.2; letter-spacing:-0.01em; font-weight:600; color:var(--text-primary); margin:0 0 14px 0; }
  .point__body { font-size:19px; line-height:1.55; color:var(--text-secondary); margin:0; }

  /* slide header block */
  .slide-head { display:flex; flex-direction:column; gap:22px; margin-bottom:54px; }
  .slide-head__row { display:flex; align-items:center; gap:20px; }

  /* category slides */
  .slide--cat::before {
    background:
      radial-gradient(1100px 800px at 30% 50%, rgba(155,109,255,0.2), transparent 62%),
      radial-gradient(900px 700px at 78% 50%, rgba(78,142,255,0.13), transparent 62%);
  }
  .cat-frame { position:absolute; inset:0; padding:0 140px; display:flex; flex-direction:column; justify-content:center; z-index:1; }
  .cat-meta { position:absolute; left:140px; right:140px; top:90px; display:flex; justify-content:space-between; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.25em; color:var(--text-muted); text-transform:uppercase; }
  .cat-num { font-family:'JetBrains Mono',monospace; font-size:20px; letter-spacing:0.3em; color:var(--text-muted); font-weight:500; margin-bottom:32px; }
  .cat-title { font-size:220px; line-height:1.05; letter-spacing:-0.05em; font-weight:800; margin:0; padding-bottom:0.12em; background:var(--gradient); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .cat-title--warm { background:var(--gradient-warm); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .cat-sub { margin-top:38px; font-size:30px; line-height:1.4; color:var(--text-secondary); max-width:1000px; font-weight:400; }
  .cat-foot { position:absolute; bottom:100px; left:140px; right:140px; display:flex; justify-content:space-between; align-items:flex-end; font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.25em; color:var(--text-muted); text-transform:uppercase; }

  /* warm slide variant */
  .slide--warm { background: #0a0608; }
  .slide--warm::before {
    background:
      radial-gradient(1200px 800px at 80% 15%, rgba(255,140,66,0.2), transparent 58%),
      radial-gradient(1000px 700px at 12% 92%, rgba(255,107,157,0.16), transparent 58%);
  }
  .slide--warm .chrome-logo__text, .slide--warm .chrome-counter { color: rgba(255,255,255,0.55); }

  /* utility */
  .stack { display:flex; flex-direction:column; }
  .row { display:flex; }
  .spacer { flex:1; }
  svg { overflow: visible; }

  /* terminal */
  .term { background:#08080f; border:1px solid var(--border); border-radius:14px; font-family:'JetBrains Mono',monospace; font-size:18px; line-height:1.65; overflow:hidden; position:relative; }
  .term__head { display:flex; align-items:center; gap:8px; padding:14px 20px; border-bottom:1px solid var(--border); background:#0b0b14; }
  .term__dot { width:10px; height:10px; border-radius:50%; background:#2a2a42; }
  .term__title { margin-left:14px; font-size:11px; letter-spacing:0.18em; color:var(--text-muted); text-transform:uppercase; }
  .term__body { padding:30px 34px; color:var(--text-primary); }
  .term__prompt { color: var(--accent-purple); }
  .term__cmd { color: var(--text-primary); font-weight:600; }
  .term__out { color: var(--text-secondary); }
  .term__dim { color: var(--text-muted); }
  .term__ok { color: var(--accent-green); }
  .term__key { color: var(--accent-blue); }
  .term__warn { color: var(--accent-orange); }

  /* figure metric */
  .figure { font-size:200px; line-height:0.9; letter-spacing:-0.04em; font-weight:800; margin:0; }
  .figure--warm { background:var(--gradient-warm); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

  /* cta cards */
  .cta-card {
    background: linear-gradient(180deg, rgba(30,14,14,0.5), rgba(18,10,14,0.4));
    border:1px solid rgba(255,140,66,0.22);
    border-radius:20px;
    padding:44px 42px;
    display:flex; flex-direction:column;
    gap:18px; min-height:440px;
    position:relative; overflow:hidden;
  }
  .cta-card::before { content:''; position:absolute; top:0; left:0; height:3px; width:100%; background:var(--gradient-warm); opacity:0.9; }
  .cta-card__num { font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.3em; color:var(--accent-orange); }
  .cta-card__title { font-size:38px; line-height:1.08; letter-spacing:-0.02em; font-weight:700; color:var(--text-primary); margin:0; }
  .cta-card__body { font-size:19px; line-height:1.55; color:var(--text-secondary); margin:0; }

  /* cover */
  .cover-bg { position:absolute; inset:0; z-index:0;
    background:
      radial-gradient(1400px 800px at 20% 30%, rgba(78,142,255,0.22), transparent 55%),
      radial-gradient(1200px 800px at 85% 80%, rgba(155,109,255,0.22), transparent 55%);
  }
  .cover-grid { position:absolute; inset:0; z-index:0;
    background-image:
      linear-gradient(rgba(136,136,168,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(136,136,168,0.05) 1px, transparent 1px);
    background-size:60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 50%, black 40%, transparent 85%);
  }

  /* ruled rows */
  .rule { height:1px; background:linear-gradient(90deg, transparent, var(--border-strong) 20%, var(--border-strong) 80%, transparent); border:0; margin:0; }

  /* node (diagram) */
  .pipe-node { display:flex; align-items:center; gap:16px; padding:20px 24px; background:var(--bg-card); border:1px solid var(--border-strong); border-radius:12px; }
  .pipe-node__icon { width:40px; height:40px; display:flex; align-items:center; justify-content:center; border-radius:10px; background:rgba(78,142,255,0.1); border:1px solid rgba(78,142,255,0.3); }
  .pipe-node__icon svg { width:20px; height:20px; stroke:var(--accent-blue); fill:none; stroke-width:1.75; }
  .pipe-node__text { display:flex; flex-direction:column; gap:4px; }
  .pipe-node__title { font-size:18px; font-weight:600; color:var(--text-primary); }
  .pipe-node__sub { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.15em; color:var(--text-muted); text-transform:uppercase; }

  /* Print: Chromium's print-to-PDF pipeline doesn't paint gradient-through-text
     (background-clip:text + -webkit-text-fill-color:transparent). Fall back to
     solid accent colors so large headlines render in exported PDFs. */
  @media print {
    .grad-text, .cat-title {
      -webkit-text-fill-color: currentColor !important;
      background: none !important;
      color: var(--accent-blue) !important;
    }
    .grad-text--warm, .cat-title--warm, .figure--warm {
      -webkit-text-fill-color: currentColor !important;
      background: none !important;
      color: var(--accent-orange) !important;
    }
  }

</style>

<script>
(async function loadSlides() {
  const FILES = [
  "slides/01-title.html",
  "slides/02-where-we-left-off.html",
  "slides/03-bmad-at-scale.html",
  "slides/04-the-problem-at-scale.html",
  "slides/05-what-agent-space-is.html",
  "slides/06-pipeline.html",
  "slides/07-category-setup.html",
  "slides/08-ai-governance.html",
  "slides/09-policies-document.html",
  "slides/10-implementation.html",
  "slides/12-category-universal-memory.html",
  "slides/13-universal-memory.html",
  "slides/14-wrap-handoff.html",
  "slides/15-start.html",
  "slides/16-category-coordination.html",
  "slides/17-agent-messaging.html",
  "slides/18-work-orders.html",
  "slides/19-category-meeting-intelligence.html",
  "slides/20-meeting-intelligence.html",
  "slides/21-category-skills.html",
  "slides/22-skill-library.html",
  "slides/23-mcp-tax.html",
  "slides/24-credentials.html",
  "slides/25-secure-layer.html",
  "slides/26-central-access.html",
  "slides/27-rights-management.html",
  "slides/30-bmad-compatible.html",
  "slides/28-lock-in.html",
  "slides/31-next-step.html"
];
  const stage = document.querySelector('deck-stage');
  try {
    const texts = await Promise.all(FILES.map(f => fetch(f).then(r => {
      if (!r.ok) throw new Error(f + ' ' + r.status);
      return r.text();
    })));
    const tmp = document.createElement('div');
    tmp.innerHTML = texts.join('\n');
    // Move each section into the stage
    Array.from(tmp.children).forEach(c => stage.appendChild(c));
    // Now load the deck-stage component
    const s = document.createElement('script');
    s.src = 'deck-stage.js';
    s.onload = () => window.dispatchEvent(new Event('slides-ready'));
    document.head.appendChild(s);
  } catch (err) {
    console.error('Failed to load slides:', err);
    const msg = document.createElement('div');
    msg.style.cssText = 'position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#06060b;color:#e8e8f0;font-family:sans-serif;padding:40px;text-align:center;';
    msg.innerHTML = '<div><h1 style="color:#ff6b9d;">Slides failed to load</h1><p>' + err.message + '</p><p style="color:#8888a8;font-size:14px;">If you opened this file directly (file://), browsers block fetch. Serve the folder with a local server, or use the standalone bundle.</p></div>';
    document.body.appendChild(msg);
  }
})();
</script>



<!-- ═══════════ CHROME (rendered across slides via JS) ═══════════ -->
<script>
window.addEventListener("slides-ready", () => {

  // Inject the Whiteport wordmark + counter on every slide.
  document.querySelectorAll('section.slide').forEach((slide) => {
    // logo
    const logo = document.createElement('div');
    logo.className = 'chrome-logo';
    logo.innerHTML = `
      <img class="chrome-logo__img" src="assets/whiteport-logo.png" alt="Whiteport">
      <span class="chrome-logo__text">Whiteport</span>
    `;
    slide.appendChild(logo);

    // counter
    const counter = document.createElement('div');
    counter.className = 'chrome-counter';
    counter.innerHTML = `<span class="chrome-counter__cur">01</span><span style="opacity:0.4; margin:0 4px;">/</span><span class="chrome-counter__total">25</span>`;
    slide.appendChild(counter);
  });

  const stage = document.querySelector('deck-stage');
  stage.addEventListener('slidechange', (e) => {
    const { index, total } = e.detail;
    document.querySelectorAll('.progress__bar').forEach(el => {
      el.style.transform = `scaleX(${(index + 1) / total})`;
    });
    document.querySelectorAll('.chrome-counter__cur').forEach(el => {
      el.textContent = String(index + 1).padStart(2, '0');
    });
    document.querySelectorAll('.chrome-counter__total').forEach(el => {
      el.textContent = String(total).padStart(2, '0');
    });
  });

});
</script>

<script>
(function(){
  const TWEAKS = /*EDITMODE-BEGIN*/{
    "accentA": "#4e8eff",

    box-shadow: 0 20px 60px rgba(0,0,0,0.6);

  `;

      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Accent A (blue)</span><input data-k="accentA" type="color" style="width:40px; height:24px; border:0; background:transparent;"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Accent B (purple)</span><input data-k="accentB" type="color" style="width:40px; height:24px; border:0; background:transparent;"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Warm A (orange)</span><input data-k="warmA" type="color" style="width:40px; height:24px; border:0; background:transparent;"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Warm B (rose)</span><input data-k="warmB" type="color" style="width:40px; height:24px; border:0; background:transparent;"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Background</span><input data-k="bgDeep" type="color" style="width:40px; height:24px; border:0; background:transparent;"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Ambient glow</span><input data-k="ambientGlow" type="range" min="0" max="2" step="0.1" style="flex:1; margin-left:14px;"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Show logo</span><input data-k="showLogo" type="checkbox"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Show counter</span><input data-k="showCounter" type="checkbox"></label>
      <label style="display:flex; align-items:center; justify-content:space-between; gap:10px;"><span style="color:#8888a8;">Show progress bar</span><input data-k="showProgress" type="checkbox"></label>
    </div>
  `;
  document.body.appendChild(panel);

  function syncInputs() {
    panel.querySelectorAll('input[data-k]').forEach(inp => {
      const k = inp.dataset.k;
      if (inp.type === 'checkbox') inp.checked = !!TWEAKS[k];
      else inp.value = TWEAKS[k];
    });
  }
  syncInputs();

  panel.addEventListener('input', (e) => {
    const inp = e.target.closest('input[data-k]'); if (!inp) return;
    const k = inp.dataset.k;
    let v = inp.type === 'checkbox' ? inp.checked : (inp.type === 'range' ? Number(inp.value) : inp.value);
    TWEAKS[k] = v;
    apply(TWEAKS);
    try { window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); } catch(_){}
  });

  window.addEventListener('message', (e) => {
    const d = e.data || {};
    if (d.type === '__activate_edit_mode') panel.style.display = 'block';
    else if (d.type === '__deactivate_edit_mode') panel.style.display = 'none';
  });

  try { window.parent.postMessage({type:'__edit_mode_available'}, '*'); } catch(_){}
})();
</script>

</body>
</html>
